# This workflow is for the zeusJuce template repo itself.
# It runs a nightly build to catch issues with dependencies, JUCE updates, etc.
# Downstream plugin repos may delete this file if they do not want scheduled template CI.
name: Nightly

on:
  schedule:
    - cron: '0 10 * * *'

jobs:
  nightly:
    # Only run on the original zeusJuce repo, not forks or downstream template copies
    if: github.repository == 'ulascanaydin/zeusJuce'
    uses: ./.github/workflows/build_and_test.yml
    secrets: inherit
