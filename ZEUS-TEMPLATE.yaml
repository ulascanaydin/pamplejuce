template:
  name: "zeus-pamplejuce"
  template_family: "pamplejuce"
  template_mode: "seeded-owned-template"
  owner: "ZEUS"
  origin_repo: "https://github.com/ulascanaydin/pamplejuce.git"
  seed_reference_repo: "https://github.com/sudara/pamplejuce.git"
  local_clone_path: "template-sources/pamplejuce"

tracking:
  default_branch: "main"
  template_sync_policy: "own-repo-only"
  dependency_sync_policy: "direct-submodule-upstreams"
  sync_command: "bin/zeus-template-sync-pamplejuce --fetch-deps"
  status_command: "bin/zeus-template-status template-sources/pamplejuce"

submodules:
  juce:
    path: "JUCE"
    upstream_repo: "https://github.com/juce-framework/JUCE/"
  cmake_includes:
    path: "cmake"
    upstream_repo: "https://github.com/sudara/cmake-includes.git"
  clap_juce_extensions:
    path: "modules/clap-juce-extensions"
    upstream_repo: "https://github.com/free-audio/clap-juce-extensions.git"

policy:
  clap_mode: "scaffold-layer"
  project_bootstrap_source: "ZEUS-owned template seeded from Pamplejuce"
  notes:
    - "ZEUS owns releases of the template."
    - "Pamplejuce is the seed/reference, not the required merge upstream."
    - "JUCE and related dependencies remain tracked through submodules."
    - "CLAP stays isolated until JUCE ships first-party CLAP authoring support."
